<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <style>
        body { margin:0; font-family:"Segoe UI",sans-serif; background:#f5f7fa; color:#1f2933; }
        .page { max-width:820px; margin:0 auto; padding:32px 20px 48px; }
        .hero { background:linear-gradient(135deg,#2b3f56,#667f95); color:#fff; border-radius:24px; padding:28px; margin-bottom:24px; }
        .nav { display:flex; gap:16px; flex-wrap:wrap; align-items:center; }
        .nav a { color:#fff; font-weight:700; }
        .card { background:#fff; border-radius:18px; padding:24px; box-shadow:0 12px 30px rgba(16,24,40,.08); }
        input, button { width:100%; box-sizing:border-box; padding:11px 12px; margin:8px 0 12px; border-radius:10px; border:1px solid #ced6dd; }
        button { background:#2b3f56; color:#fff; border:0; font-weight:700; cursor:pointer; }
        .ok { color:#166534; font-weight:700; }
        .err { color:#a12626; font-weight:700; }
    </style>
</head>
<body>
<div class="page">
    <section class="hero">
        <h1>Ho so nguoi dung</h1>
        <div class="nav">
            <a th:href="${salesUrl}">Ban hang</a>
            <a th:if="${isAdmin}" th:href="${dashboardUrl}">Dashboard</a>
            <a th:if="${isAdmin}" th:href="${employeesUrl}">Nhan vien</a>
            <a th:href="${shopUrl}" target="_blank">Shop online</a>
            <form method="post" action="/logout" style="display:inline;">
                <button type="submit" style="width:auto; margin:0; background:none; border:0; color:#fff; font-weight:700;">Dang xuat</button>
            </form>
        </div>
    </section>
    <p th:if="${success}" th:text="${success}" class="ok"></p>
    <p th:if="${error}" th:text="${error}" class="err"></p>
    <section class="card">
        <form method="post" action="/profile" th:if="${user != null}">
            <label>Ho ten</label>
            <input type="text" name="fullName" th:value="${user.fullName()}" required>
            <label>Email</label>
            <input type="email" name="email" th:value="${user.email()}" required>
            <label>Dia chi</label>
            <input type="text" name="address" th:value="${user.address()}" required>
            <label>So dien thoai</label>
            <input type="text" name="phoneNumber" th:value="${user.phoneNumber()}" required>
            <label>Avatar</label>
            <input type="text" name="avatar" th:value="${user.avatar()}">
            <button type="submit">Cap nhat ho so</button>
        </form>
        <p th:if="${user == null}">Khong tim thay user.</p>
    </section>
</div>
</body>
</html>
