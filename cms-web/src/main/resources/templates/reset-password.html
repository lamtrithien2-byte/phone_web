<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <style>
        body { margin: 0; font-family: "Segoe UI", sans-serif; background: linear-gradient(135deg, #f4f1e8, #d7e6f1); color: #1d2a34; }
        .layout { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
        .card { width: min(460px, 100%); background: #fff; border-radius: 20px; padding: 32px; box-shadow: 0 18px 50px rgba(29, 42, 52, 0.12); }
        input, button { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid #cfd8df; margin-bottom: 16px; box-sizing: border-box; }
        button { border: 0; background: #153b50; color: #fff; font-weight: 700; cursor: pointer; }
        .ok { color: #166534; font-weight: 700; }
        .err { color: #a12626; font-weight: 700; }
    </style>
</head>
<body>
<div class="layout">
    <form class="card" method="post" action="/reset-password">
        <h1>Reset mat khau</h1>
        <p class="ok" th:if="${success}" th:text="${success}"></p>
        <p class="err" th:if="${error}" th:text="${error}"></p>
        <label>Token</label>
        <input type="text" name="token" th:value="${token}" required>
        <label>Mat khau moi</label>
        <input type="password" name="newPassword" required>
        <button type="submit">Dat lai mat khau</button>
        <p><a href="/login">Quay lai dang nhap</a></p>
    </form>
</div>
</body>
</html>
