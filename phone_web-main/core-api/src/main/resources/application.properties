spring.application.name=phone-store-core-api
server.port=8081

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/phone_store?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true&noAccessToProcedureBodies=true
spring.datasource.username=phone_store_app
spring.datasource.password=Lamtrithien2002

# Hibernate/JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# HTTP encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Mail
app.mail.delivery-mode=preview
app.mail.from-address=no-reply@phonestore.local
app.mail.from-name=Phone Store
app.mail.preview-dir=upload/mail-preview
app.mail.cms-reset-url-template=http://localhost:8082/reset-password?token=%s

# Optional SMTP settings
spring.mail.host=
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
