<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu</title>
    <style>
        body { margin: 0; font-family: "Segoe UI", sans-serif; background: linear-gradient(135deg, #f4f1e8, #d7e6f1); color: #1d2a34; }
        .layout { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
        .card { width: min(520px, 100%); background: #fff; border-radius: 20px; padding: 32px; box-shadow: 0 18px 50px rgba(29, 42, 52, 0.12); }
        input, button { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid #cfd8df; margin-bottom: 16px; box-sizing: border-box; }
        button { border: 0; background: #153b50; color: #fff; font-weight: 700; cursor: pointer; }
        .ok { color: #166534; font-weight: 700; }
        .err { color: #a12626; font-weight: 700; }
        .hint { color: #51606d; line-height: 1.5; }
        .path { background: #f5f7fa; border: 1px solid #d9e1e8; border-radius: 12px; padding: 12px; font-family: Consolas, monospace; word-break: break-all; }
    </style>
</head>
<body>
<div class="layout">
    <form class="card" method="post" action="/forgot-password">
        <h1>Quên mật khẩu</h1>
        <p class="hint">Nhập email đã dùng trong tài khoản. Nếu máy chưa cấu hình gửi email, hệ thống sẽ tạo sẵn một tệp xem trước để bạn lấy đường dẫn đặt lại mật khẩu.</p>
        <p class="ok" th:if="${success}" th:text="${success}"></p>
        <p class="err" th:if="${error}" th:text="${error}"></p>
        <label>Email</label>
        <input type="email" name="email" required>
        <button type="submit">Gửi hướng dẫn đặt lại</button>
        <div th:if="${previewFile != null}">
            <p class="hint">Tệp xem trước đã được tạo tại:</p>
            <div class="path" th:text="${previewFile}"></div>
            <p class="hint">Mở tệp này để lấy đường dẫn đặt lại mật khẩu.</p>
        </div>
        <p th:if="${deliveryMode != null}" class="hint" th:text="'Cách gửi hiện tại: ' + ${deliveryMode}"></p>
        <p><a href="/login">Quay lại trang đăng nhập</a></p>
    </form>
</div>
</body>
</html>
