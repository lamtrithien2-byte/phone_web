<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tổng quan cửa hàng</title>
    <link rel="stylesheet" href="/css/cms-header.css">
    <style>
        :root {
            --bg: #f4f7fb;
            --panel: #ffffff;
            --ink: #172033;
            --muted: #667085;
            --brand: #18354a;
            --shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: "Segoe UI", sans-serif; background: var(--bg); color: var(--ink); }
        a { color: inherit; text-decoration: none; }
        .page { max-width: 1420px; margin: 0 auto; padding: 32px 20px 48px; }
        .stats { display: grid; gap: 16px; margin-bottom: 24px; }
        .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        .card, table { background: var(--panel); border-radius: 18px; box-shadow: var(--shadow); }
        .card { padding: 20px; }
        .card strong { display: block; margin-bottom: 8px; font-size: 18px; }
        .card p { margin: 0 0 14px; line-height: 1.6; color: var(--muted); }
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 11px 14px; border-radius: 12px; background: var(--brand); color: #fff; font-weight: 700; }
        .stat { padding: 18px; }
        .stat span { color: var(--muted); }
        .stat strong { display: block; margin-top: 8px; font-size: 28px; }
        .panel { background: var(--panel); border-radius: 18px; box-shadow: var(--shadow); padding: 20px; }
        h2 { margin: 0 0 16px; }
        table { width: 100%; border-collapse: collapse; overflow: hidden; }
        th, td { text-align: left; padding: 14px 16px; border-bottom: 1px solid #eef2f6; }
        th { background: #eff4f8; }
        .success { color: #166534; font-weight: 700; }
        .error { color: #a12626; font-weight: 700; }
        @media (max-width: 1100px) {
            .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
        @media (max-width: 760px) {
            .stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="page">
            <section th:replace="~{fragments/cms-header :: header(
        title='T&#7893;ng quan c&#7917;a h&#224;ng',
        description=(${role != null and #strings.equalsIgnoreCase(role, 'admin')} ? 'B&#7841;n &#273;ang xem t&#7893;ng quan to&#224;n b&#7897; c&#7917;a h&#224;ng.' : 'B&#7841;n &#273;ang xem t&#7893;ng quan b&#225;n h&#224;ng c&#7911;a ch&#237;nh t&#224;i kho&#7843;n n&#224;y.'),
        activePage=${activePage},
        isAdmin=${role != null and #strings.equalsIgnoreCase(role, 'admin')},
        dashboardUrl=${dashboardUrl},
        productManagementUrl=${productManagementUrl},
        voucherManagementUrl=${voucherManagementUrl},
        salesUrl=${salesUrl},
        customerLookupUrl=${customerLookupUrl},
        employeesUrl=${employeesUrl},
        profileUrl=${profileUrl},
        shopUrl=${shopUrl}
    )}"></section>

    <p th:if="${success}" th:text="${success}" class="success"></p>
    <p th:if="${error}" th:text="${error}" class="error"></p>

    <section class="stats" th:if="${summary != null}">
        <div class="card stat">
            <span th:text="${role != null and #strings.equalsIgnoreCase(role, 'admin')} ? 'Tổng doanh thu' : 'Doanh thu của bạn'"></span>
            <strong th:text="${summary.money()}"></strong>
        </div>
        <div class="card stat">
            <span th:text="${role != null and #strings.equalsIgnoreCase(role, 'admin')} ? 'Tổng sản phẩm đã bán' : 'Sản phẩm bạn đã bán'"></span>
            <strong th:text="${summary.quantity()}"></strong>
        </div>
        <div class="card stat">
            <span th:text="${role != null and #strings.equalsIgnoreCase(role, 'admin')} ? 'Số đơn đã hoàn tất' : 'Số đơn bạn đã hoàn tất'"></span>
            <strong th:text="${summary.invoiceNumber()}"></strong>
        </div>
        <div class="card stat">
            <span th:text="${role != null and #strings.equalsIgnoreCase(role, 'admin')} ? 'Số nhân viên' : 'Vai trò hiện tại'"></span>
            <strong th:text="${role != null and #strings.equalsIgnoreCase(role, 'admin') ? summary.userNumber : 'Nhân viên'}"></strong>
        </div>
    </section>

    <section class="panel">
        <h2 th:text="${role != null and #strings.equalsIgnoreCase(role, 'admin')} ? 'Kết quả bán hàng theo nhân viên' : 'Kết quả bán hàng của bạn'"></h2>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Nhân viên</th>
                <th>Số đơn</th>
                <th>Số sản phẩm đã bán</th>
                <th>Doanh thu</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${staffRevenue}">
                <td th:text="${item.userId()}"></td>
                <td th:text="${item.fullName()}"></td>
                <td th:text="${item.invoiceCount()}"></td>
                <td th:text="${item.totalQuantity()}"></td>
                <td th:text="${item.totalRevenue()}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(staffRevenue)}">
                <td colspan="5">Chưa có dữ liệu bán hàng.</td>
            </tr>
            </tbody>
        </table>
    </section>
</div>
</body>
</html>
