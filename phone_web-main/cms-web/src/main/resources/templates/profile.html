<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hồ sơ cá nhân</title>
    <link rel="stylesheet" href="/css/cms-header.css">
    <style>
        :root {
            --bg: #f4f7fb;
            --panel: #ffffff;
            --ink: #172033;
            --brand: #18354a;
            --shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: "Segoe UI", sans-serif; background: var(--bg); color: var(--ink); }
        a { color: inherit; text-decoration: none; }
        .page { max-width: 1420px; margin: 0 auto; padding: 32px 20px 48px; }
        .card { background: var(--panel); border-radius: 18px; padding: 24px; box-shadow: var(--shadow); }
        input, button { width: 100%; box-sizing: border-box; padding: 11px 12px; margin: 8px 0 12px; border-radius: 10px; border: 1px solid #ced6dd; font: inherit; }
        button { background: var(--brand); color: #fff; border: 0; font-weight: 700; cursor: pointer; }
        .ok { color: #166534; font-weight: 700; }
        .err { color: #a12626; font-weight: 700; }
    </style>
</head>
<body>
<div class="page">
            <section th:replace="~{fragments/cms-header :: header(
        title='H&#7891; s&#417; c&#225; nh&#226;n',
        description='C&#7853;p nh&#7853;t th&#244;ng tin t&#224;i kho&#7843;n trong c&#249;ng m&#7897;t header &#273;i&#7873;u h&#432;&#7899;ng th&#7889;ng nh&#7845;t v&#7899;i to&#224;n b&#7897; khu CMS.',
        activePage=${activePage},
        isAdmin=${isAdmin},
        dashboardUrl=${dashboardUrl},
        productManagementUrl=${productManagementUrl},
        voucherManagementUrl=${voucherManagementUrl},
        salesUrl=${salesUrl},
        customerLookupUrl=${customerLookupUrl},
        employeesUrl=${employeesUrl},
        profileUrl=${profileUrl},
        shopUrl=${shopUrl}
    )}"></section>
    <p th:if="${success}" th:text="${success}" class="ok"></p>
    <p th:if="${error}" th:text="${error}" class="err"></p>
    <section class="card">
        <form method="post" action="/profile" th:if="${user != null}">
            <label>Họ và tên</label>
            <input type="text" name="fullName" th:value="${user.fullName()}" required>
            <label>Email</label>
            <input type="email" name="email" th:value="${user.email()}" required>
            <label>Địa chỉ</label>
            <input type="text" name="address" th:value="${user.address()}" required>
            <label>Số điện thoại</label>
            <input type="text" name="phoneNumber" th:value="${user.phoneNumber()}" required>
            <label>Ảnh đại diện</label>
            <input type="text" name="avatar" th:value="${user.avatar()}">
            <button type="submit">Lưu thay đổi</button>
        </form>
        <p th:if="${user == null}">Không tìm thấy thông tin tài khoản.</p>
    </section>
</div>
</body>
</html>
